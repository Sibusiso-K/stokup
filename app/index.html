<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f8a4c" />
<title>StokUp — order stock</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="stylesheet" href="css/styles.css" />

<header class="app-header">
  <span class="mode-flag" id="modeFlag"></span>
  <div class="brand" id="brandName">StokUp</div>
  <div class="tagline" id="tagline">Stock your spaza without leaving it.</div>
</header>

<div class="wrap">
  <input class="search" id="search" type="search" placeholder="Search stock… (maize, oil, coke)" />
  <div class="chips" id="chips"></div>
  <div id="catalog"></div>
</div>

<!-- Fixed cart bar -->
<div class="cartbar" id="cartbar">
  <div>
    <div class="summary" id="cartSummary">0 items</div>
    <div class="total" id="cartTotal">R0</div>
  </div>
  <button id="openCart">View cart →</button>
</div>

<!-- Cart / checkout sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-head">
    <h2 id="sheetTitle">Your order</h2>
    <button class="close-x" id="closeSheet">&times;</button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<script src="config.js"></script>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
</script>
