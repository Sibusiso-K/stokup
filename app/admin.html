<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f8a4c" />
<title>StokUp — operator</title>
<link rel="icon" href="icon.svg" />
<link rel="stylesheet" href="css/styles.css" />

<!-- PIN gate -->
<div id="gate" class="pin-gate">
  <h1 id="gateBrand">StokUp operator</h1>
  <p class="hint">Enter the operator PIN to manage orders.</p>
  <input id="pin" type="password" inputmode="numeric" placeholder="PIN" />
  <div style="margin-top:12px"><button class="btn" id="unlock">Unlock</button></div>
  <div id="pinErr" class="hint" style="color:var(--danger)"></div>
</div>

<!-- App (hidden until unlocked) -->
<div id="app" style="display:none">
  <header class="app-header">
    <span class="mode-flag" id="modeFlag"></span>
    <div class="brand">Operator dashboard</div>
    <div class="tagline" id="opSummary">—</div>
  </header>

  <div class="tabbar">
    <button data-tab="orders" class="active">Orders</button>
    <button data-tab="pick">Pick list</button>
    <button data-tab="catalog">Catalog</button>
  </div>

  <div class="wrap" id="content"></div>
</div>

<script src="config.js"></script>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/admin.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
</script>
